project:
  type: book
  output-dir: docs

bibliography: library/references.bib
date: last-modified
date-format: "MMM YYYY"

book:
  title: "Data Science Foundations"
  subtitle: "A Structured Python Workflow from Raw Data to Interpretation"

  chapters:
    - index.qmd

    - part: "Foundations"
      chapters:
        - 00-preface.qmd
        - 01-setting-up-environment.qmd
        - 02-load-and-explore-dataset.qmd
        - 03-data-cleaning-and-preparation.qmd
        - 04-data-wrangling-basics.qmd
        - 05-visualization-basics.qmd
        - 06-summary-statistics-and-insights.qmd
        - 07-from-analysis-to-ml.qmd
        - 99-complete-free-track.qmd

    - part: "Reference"
      chapters:
        - 999-appendix.qmd
        - 999-references.qmd

format:
  html:
    toc: true
    toc-depth: 3
    number-sections: false
    number-depth: 2
    smooth-scroll: true
    anchor-sections: true
    link-external-icon: true
    css: assets/css/cdi.css
    code-fold: true
    mermaid:
      theme: forest

execute:
  echo: true
  warning: false
  message: false
  freeze: auto
  working-dir: .